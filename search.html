    .card-spotify {
      position: relative;
      height: 120px;
      overflow: hidden;
      padding: 16px;
      cursor: pointer;
      border: none;
      transition: transform 0.3s ease;
    }
    .card-spotify:hover {
      filter: brightness(1.1);
    }
    .spotify-card-img {
      position: absolute;
      width: 80px;
      height: 80px;
      bottom: -10px;
      right: -20px;
      transform: rotate(25deg);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      border-radius: 4px;
      object-fit: cover;
    }
    .fixed-navbar-spotify {
      background-color: rgba(0, 0, 0, 0.301);
      backdrop-filter: blur(10px);
    }
  </style>
